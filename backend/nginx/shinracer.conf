server {
    # Dedicated port, not 80/default_server — the bare IP root on this Pi is
    # already claimed by imq2's own web app (nginx's existing default_server
    # catch-all proxies http://192.168.1.203/ to it on :8766). ShinRacer gets
    # its own port instead of fighting over the shared IP root.
    listen 8080 default_server;
    server_name _;

    # PWA static files
    root /home/shinobi/shinracer-pwa;
    index index.html;

    # SPA routing — all non-file requests serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Auth callback route (must serve index.html)
    location /auth/callback {
        try_files /index.html =404;
    }

    # Proxy API to Express backend
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy Socket.io
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service worker must not be cached
    location /sw.js {
        add_header Cache-Control "no-cache";
        expires 0;
    }
}
