server {
    # Dedicated port, not 80/default_server — the bare IP root on this Pi is
    # already claimed by imq2's own web app (nginx's existing default_server
    # catch-all proxies http://192.168.1.203/ to it on :8766). ShinRacer gets
    # its own port instead of fighting over the shared IP root.
    listen 8080 default_server;
    server_name _;

    # PWA static files — lives outside /home/shinobi so nginx's www-data
    # worker can read it without needing traversal permission on the home
    # directory.
    root /var/www/shinracer-pwa;
    index index.html;

    # SPA routing — all non-file requests serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Auth callback route (must serve index.html)
    location /auth/callback {
        try_files /index.html =404;
    }

    # Proxy API to Express backend
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy Socket.io
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service worker must not be cached
    location /sw.js {
        add_header Cache-Control "no-cache";
        expires 0;
    }
}

# HTTPS is handled by Tailscale Serve, not nginx — `tailscale serve --bg
# --https=8443 http://127.0.0.1:8080` on shinobi terminates TLS itself
# (cert issuance/renewal included) and reverse-proxies plain HTTP into this
# same 8080 block above. This is tailnet-only (not Funnel — port 443 on this
# hostname is already Funnel'd to a different app, imq2/Q2, on port 80; see
# `tailscale serve status` on shinobi). Reachable at
# https://shinobi.tail9249a1.ts.net:8443/ from any device on the tailnet.
# An earlier version of this file had a manual `listen 443 ssl` block with a
# hand-issued `tailscale cert` — reverted once Funnel turned out to already
# own port 443 for a different service; `tailscale serve` on a dedicated
# port does the same job with no nginx/cert-file management at all.
