<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShinRacer — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #050507;
      color: #E8F0FF;
      font-family: 'Barlow Condensed', 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .wrap { padding: 24px; max-width: 360px; }
    .logo {
      font-family: 'Bebas Neue', 'Barlow Condensed', sans-serif;
      font-size: 42px;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }
    .logo span { color: #0066FF; }
    p { font-size: 15px; color: #7A90B8; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo"><span>Shin</span>Racer</div>
    <p>You're offline. Connect to Tailscale or your network.</p>
  </div>
</body>
</html>
