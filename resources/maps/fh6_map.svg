<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="2000" viewBox="0 0 2000 2000">
  <defs>
    <pattern id="grid6" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#1C2233" stroke-width="1" opacity="0.5" />
    </pattern>
  </defs>
  <rect width="2000" height="2000" fill="#0D0F12" />
  <rect width="2000" height="2000" fill="url(#grid6)" />

  <!-- Simplified stylized coastline/island shape, not a real map -->
  <path d="M 300,1600 L 200,1250 L 350,950 L 300,650 L 550,400 L 900,300 L 1250,220
           L 1600,300 L 1850,550 L 1900,900 L 1750,1200 L 1800,1500 L 1550,1750
           L 1200,1850 L 850,1800 L 550,1750 Z"
        fill="none" stroke="#2A3A5C" stroke-width="4" />

  <!-- A few simplified road lines suggesting layout -->
  <path d="M 350,1300 Q 700,1100 1000,1250 T 1700,1050" fill="none" stroke="#353D47" stroke-width="6" stroke-linecap="round" />
  <path d="M 500,600 Q 850,750 1200,600 T 1750,550" fill="none" stroke="#353D47" stroke-width="6" stroke-linecap="round" />
  <path d="M 800,1750 Q 850,1200 800,750 T 900,300" fill="none" stroke="#353D47" stroke-width="6" stroke-linecap="round" />

  <text x="1000" y="960" text-anchor="middle" font-family="'Rubik Mono One', 'Courier New', monospace"
        font-size="120" letter-spacing="6" fill="#7A90B8">FORZA HORIZON 6</text>
  <text x="1000" y="1040" text-anchor="middle" font-family="'Space Mono', 'Courier New', monospace"
        font-size="34" letter-spacing="4" fill="#3A4A66">PLACEHOLDER MAP</text>
  <text x="1000" y="1110" text-anchor="middle" font-family="'Space Mono', 'Courier New', monospace"
        font-size="24" fill="#3A4A66">Replace with fh6_map.jpg for a real map</text>
</svg>
