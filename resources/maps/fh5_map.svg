<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="2000" viewBox="0 0 2000 2000">
  <defs>
    <pattern id="grid5" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#1C2233" stroke-width="1" opacity="0.5" />
    </pattern>
  </defs>
  <rect width="2000" height="2000" fill="#0D0F12" />
  <rect width="2000" height="2000" fill="url(#grid5)" />

  <!-- Simplified stylized coastline shape, not a real map -->
  <path d="M 150,1750 L 300,1400 L 250,1100 L 450,900 L 400,600 L 650,450 L 700,200
           L 1000,150 L 1350,250 L 1600,180 L 1850,350 L 1900,650 L 1700,900
           L 1800,1200 L 1600,1500 L 1350,1650 L 1050,1850 L 700,1900 L 400,1800 Z"
        fill="none" stroke="#2A3A5C" stroke-width="4" />

  <!-- A few simplified road lines suggesting layout -->
  <path d="M 250,1400 Q 600,1200 900,1300 T 1600,1100" fill="none" stroke="#353D47" stroke-width="6" stroke-linecap="round" />
  <path d="M 500,700 Q 800,850 1100,700 T 1700,600" fill="none" stroke="#353D47" stroke-width="6" stroke-linecap="round" />
  <path d="M 700,1800 Q 750,1300 700,900 T 750,300" fill="none" stroke="#353D47" stroke-width="6" stroke-linecap="round" />

  <text x="1000" y="960" text-anchor="middle" font-family="'Bebas Neue', 'Barlow Condensed', sans-serif"
        font-size="120" letter-spacing="6" fill="#7A90B8">FORZA HORIZON 5</text>
  <text x="1000" y="1040" text-anchor="middle" font-family="'Barlow Condensed', sans-serif"
        font-size="34" letter-spacing="4" fill="#3A4A66">MEXICO — PLACEHOLDER MAP</text>
  <text x="1000" y="1110" text-anchor="middle" font-family="'Barlow Condensed', sans-serif"
        font-size="24" fill="#3A4A66">Replace with fh5_map.jpg for a real map</text>
</svg>
